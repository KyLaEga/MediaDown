name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --name "MediaDown" --windowed --onefile main.py
        
    - name: Package Windows
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path dist\MediaDown.exe -DestinationPath MediaDown-Windows.zip

    - name: Package macOS
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        zip -r ../MediaDown-macOS.zip MediaDown.app

    - name: Package Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd dist
        zip ../MediaDown-Linux.zip MediaDown
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-archive-${{ matrix.os }}
        path: MediaDown-*.zip
        
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: release-archive-*
        merge-multiple: true
        
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/MediaDown-*.zip
